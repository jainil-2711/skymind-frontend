name: Frontend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, Type-check, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create .env for build
        run: echo "VITE_API_URL=http://localhost:8000/api/v1" > .env

      - name: Lint
        run: npx eslint .

      - name: Type-check
        run: npx tsc --noEmit --project tsconfig.app.json

      - name: Build
        run: npm run build